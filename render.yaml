services:
  - type: web
    name: rag-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/project/src/data/vector_store
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/data/rag_app.db
